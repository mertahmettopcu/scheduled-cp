name: Crypto Futures Pipeline (VPN only for Binance)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  vpn-job:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Log trigger time
        run: |
          echo "Triggered at UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Triggered at Turkey time: $(TZ=Europe/Istanbul date '+%Y-%m-%d %H:%M:%S')"

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          openvpn --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests pandas numpy supabase python-dotenv httpx
          fi

      - name: Create OVPN file
        shell: bash
        env:
          VPN_OVPN: ${{ secrets.VPN_OVPN }}
        run: |
          set -euo pipefail

          if [ -z "${VPN_OVPN:-}" ]; then
            echo "::error ::Missing VPN_OVPN secret."
            exit 1
          fi

          printf '%s' "$VPN_OVPN" > vpnbook.ovpn

          grep -qi '^auth-user-pass' vpnbook.ovpn || echo 'auth-user-pass vpn-auth.txt' >> vpnbook.ovpn
          grep -qi '^auth-nocache' vpnbook.ovpn || echo 'auth-nocache' >> vpnbook.ovpn
          grep -qi '^remote-cert-tls' vpnbook.ovpn || echo 'remote-cert-tls server' >> vpnbook.ovpn
          grep -qi '^pull-filter ignore "block-outside-dns"' vpnbook.ovpn || echo 'pull-filter ignore "block-outside-dns"' >> vpnbook.ovpn
          grep -qi '^allow-compression no' vpnbook.ovpn || echo 'allow-compression no' >> vpnbook.ovpn

          chmod 600 vpnbook.ovpn

      - name: Create VPN auth
        shell: bash
        env:
          VPN_USER: ${{ secrets.VPN_USER }}
          VPN_PASS: ${{ secrets.VPN_PASS }}
        run: |
          set -euo pipefail

          if [ -z "${VPN_USER:-}" ] || [ -z "${VPN_PASS:-}" ]; then
            echo "::error ::Missing VPN_USER or VPN_PASS secret."
            exit 1
          fi

          printf '%s\n%s\n' "$VPN_USER" "$VPN_PASS" > vpn-auth.txt
          chmod 600 vpn-auth.txt

      - name: Connect to VPN
        shell: bash
        run: |
          set -euo pipefail
      
          sudo openvpn \
            --config vpnbook.ovpn \
            --auth-user-pass vpn-auth.txt \
            --auth-nocache \
            --daemon \
            --writepid /tmp/ovpn.pid \
            --log /tmp/ovpn.log
      
          for i in {1..45}; do
            if sudo grep -q 'AUTH_FAILED' /tmp/ovpn.log; then
              echo "::error ::VPN login failed."
              sudo tail -n +1 /tmp/ovpn.log || true
              exit 1
            fi
      
            if sudo grep -q 'Initialization Sequence Completed' /tmp/ovpn.log; then
              echo "VPN connected."
              break
            fi
      
            sleep 2
          done
      
          if ! sudo grep -q 'Initialization Sequence Completed' /tmp/ovpn.log; then
            echo "::error ::VPN did not connect in time."
            sudo tail -n 200 /tmp/ovpn.log || true
            exit 1
          fi

      - name: Verify public IP
        shell: bash
        run: |
          set -uo pipefail
          echo "Public IP after VPN:"

          endpoints=(
            "https://api.ipify.org"
            "https://ifconfig.me/ip"
            "https://icanhazip.com"
          )

          success=0
          used_endpoint=""
          ip_output=""

          for endpoint in "${endpoints[@]}"; do
            echo "Trying endpoint: $endpoint"

            for i in 1 2 3; do
              if ip_output="$(curl --fail --silent --show-error --max-time 20 "$endpoint")"; then
                ip_output="$(echo "$ip_output" | tr -d '\r' | tr -d '\n' | xargs)"
                if [ -n "$ip_output" ]; then
                  echo "Public IP detected: $ip_output"
                  echo "IP endpoint used: $endpoint"
                  success=1
                  used_endpoint="$endpoint"
                  break
                fi
              fi

              echo "IP check failed for $endpoint (attempt $i), retrying..."
              sleep $((i * 2))
            done

            if [ "$success" -eq 1 ]; then
              break
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "::warning ::Public IP check failed on all fallback endpoints. VPN may still be usable, continuing to Binance fetch."
          fi

      - name: Fetch Binance data only
        env:
          GOOGLE_SHEETS_SYMBOLS_CSV_URL: ${{ vars.GOOGLE_SHEETS_SYMBOLS_CSV_URL }}
        run: python crypto_futures_fetch_binance.py

      - name: Disconnect VPN before Supabase/Telegram
        if: always()
        run: |
          if [ -f /tmp/ovpn.pid ]; then
            sudo kill "$(cat /tmp/ovpn.pid)" || true
            sleep 2
          fi
          sudo pkill -x openvpn || true
          echo "---- Final OpenVPN log ----"
          sudo tail -n +1 /tmp/ovpn.log || true

      - name: Process and upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: python crypto_futures_process_upload.py
