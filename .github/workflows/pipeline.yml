name: Crypto Futures Pipeline (VPN only for Binance)

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '7,22,37,52 * * * *'

jobs:
  vpn-job:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Log trigger time
        run: |
          echo "Triggered at UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Triggered at Turkey time: $(TZ=Europe/Istanbul date '+%Y-%m-%d %H:%M:%S')"

      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          openvpn --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests pandas numpy supabase python-dotenv httpx
          fi

      - name: Create OVPN file
        shell: bash
        env:
          VPN_OVPN: ${{ secrets.VPN_OVPN }}
        run: |
          set -euo pipefail
          printf '%s' "$VPN_OVPN" > vpnbook.ovpn
          echo 'auth-user-pass vpn-auth.txt' >> vpnbook.ovpn
          chmod 600 vpnbook.ovpn

      - name: Create VPN auth
        shell: bash
        env:
          VPN_USER: ${{ secrets.VPN_USER }}
          VPN_PASS: ${{ secrets.VPN_PASS }}
        run: |
          printf '%s\n%s\n' "$VPN_USER" "$VPN_PASS" > vpn-auth.txt
          chmod 600 vpn-auth.txt

      - name: Connect to VPN
        run: |
          sudo openvpn --config vpnbook.ovpn --auth-user-pass vpn-auth.txt --daemon --writepid /tmp/ovpn.pid --log /tmp/ovpn.log
          sleep 10

      - name: Verify public IP
        run: curl https://api.ipify.org

      - name: Fetch Binance data only
        run: python crypto_futures_fetch_binance.py

      - name: Disconnect VPN
        run: |
          sudo kill $(cat /tmp/ovpn.pid) || true
          sudo pkill openvpn || true

      - name: Process and upload
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: python crypto_futures_process_upload.py
