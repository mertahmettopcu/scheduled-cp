name: Scheduled TS

on:
  workflow_dispatch:

jobs:
  scheduled-job:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Log trigger time
        run: |
          echo "Triggered at UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Triggered at Turkey time: $(TZ=Europe/Istanbul date '+%Y-%m-%d %H:%M:%S')"

      - name: Install tunnel client
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          openvpn --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests pandas numpy supabase python-dotenv httpx
          fi
          
      - name: Prepare active symbol list
        env:
          GOOGLE_SHEETS_SYMBOLS_CSV_URL: ${{ vars.GOOGLE_SHEETS_SYMBOLS_CSV_URL }}
          FETCH_SOURCE_MODE: prepare_pairs
        run: python fetch_source_data.py
        
      - name: Write tunnel config
        shell: bash
        env:
          VPN_OVPN: ${{ secrets.VPN_OVPN }}
        run: |
          set -euo pipefail

          if [ -z "${VPN_OVPN:-}" ]; then
            echo "::error ::Missing VPN_OVPN secret."
            exit 1
          fi

          printf '%s' "$VPN_OVPN" > vpnbook.ovpn

          grep -qi '^auth-user-pass' vpnbook.ovpn || echo 'auth-user-pass vpn-auth.txt' >> vpnbook.ovpn
          grep -qi '^auth-nocache' vpnbook.ovpn || echo 'auth-nocache' >> vpnbook.ovpn
          grep -qi '^remote-cert-tls' vpnbook.ovpn || echo 'remote-cert-tls server' >> vpnbook.ovpn
          grep -qi '^pull-filter ignore "block-outside-dns"' vpnbook.ovpn || echo 'pull-filter ignore "block-outside-dns"' >> vpnbook.ovpn
          grep -qi '^allow-compression no' vpnbook.ovpn || echo 'allow-compression no' >> vpnbook.ovpn

          chmod 600 vpnbook.ovpn

      - name: Fetch VPNBook credentials
        shell: bash
        env:
          VPN_PASS_SECRET: ${{ secrets.VPN_PASS }}
        run: |
          set -euo pipefail

          curl -fsSL 'https://www.vpnbook.com/tr/freevpn/openvpn' -o vpnbook_page.html

          VPN_USER_DYNAMIC="vpnbook"

          VPN_PASS_DYNAMIC="$(python - <<'PY'
          import re
          from pathlib import Path

          page = Path("vpnbook_page.html").read_text(encoding="utf-8", errors="ignore")

          # Daha kontrollü: Parola label'ından sonraki yakın HTML alanında ara
          match = re.search(
              r'PAROLA.*?([A-Za-z0-9]{6,20})',
              page,
              re.IGNORECASE | re.DOTALL,
          )

          if match:
              print(match.group(1).strip())
          PY
          )"

          rm -f vpnbook_page.html

          if [ -z "$VPN_PASS_DYNAMIC" ]; then
            echo "::error ::VPN password fetch failed."
            exit 1
          fi

          echo "::add-mask::$VPN_USER_DYNAMIC"
          echo "::add-mask::$VPN_PASS_DYNAMIC"
          echo "::add-mask::$VPN_PASS_SECRET"

          if [ "$VPN_PASS_DYNAMIC" = "$VPN_PASS_SECRET" ]; then
            echo "Fetched VPN password matches current GitHub secret."
          else
            echo "::error ::Fetched VPN password does NOT match current GitHub secret."
            echo "Fetched length: ${#VPN_PASS_DYNAMIC}"
            echo "Secret length: ${#VPN_PASS_SECRET}"
            exit 1
          fi

          echo "VPN_USER=$VPN_USER_DYNAMIC" >> "$GITHUB_ENV"
          echo "VPN_PASS=$VPN_PASS_DYNAMIC" >> "$GITHUB_ENV"
          
      - name: Write tunnel credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VPN_USER:-}" ] || [ -z "${VPN_PASS:-}" ]; then
            echo "::error ::Missing VPN credentials."
            exit 1
          fi

          printf '%s\n%s\n' "$VPN_USER" "$VPN_PASS" > vpn-auth.txt
          chmod 600 vpn-auth.txt

      - name: Start network tunnel
        shell: bash
        run: |
          set -euo pipefail

          sudo openvpn \
            --config vpnbook.ovpn \
            --auth-user-pass vpn-auth.txt \
            --auth-nocache \
            --daemon \
            --writepid /tmp/ovpn.pid \
            --log /tmp/ovpn.log

          for i in {1..45}; do
            if sudo grep -q 'AUTH_FAILED' /tmp/ovpn.log; then
              echo "::error ::Tunnel login failed."
              exit 1
            fi

            if sudo grep -q 'Initialization Sequence Completed' /tmp/ovpn.log; then
              echo "Tunnel connected."
              break
            fi

            sleep 2
          done

          if ! sudo grep -q 'Initialization Sequence Completed' /tmp/ovpn.log; then
            echo "::error ::Tunnel did not connect in time."
            exit 1
          fi

      - name: Check outbound connectivity
        shell: bash
        run: |
          set -uo pipefail
          echo "Checking outbound connectivity...:"

          endpoints=(
            "https://api.ipify.org"
            "https://ifconfig.me/ip"
            "https://icanhazip.com"
          )

          success=0
          used_endpoint=""
          ip_output=""

          for endpoint in "${endpoints[@]}"; do
            echo "Trying endpoint: $endpoint"

            for i in 1 2 3; do
              if ip_output="$(curl --fail --silent --show-error --max-time 20 "$endpoint")"; then
                ip_output="$(echo "$ip_output" | tr -d '\r' | tr -d '\n' | xargs)"
                if [ -n "$ip_output" ]; then
                  echo "Public IP check succeeded."
                  success=1
                  used_endpoint="$endpoint"
                  break
                fi
              fi

              echo "IP check failed for $endpoint (attempt $i), retrying..."
              sleep $((i * 2))
            done

            if [ "$success" -eq 1 ]; then
              break
            fi
          done

          if [ "$success" -ne 1 ]; then
            echo "::warning ::Connectivity check failed on all fallback endpoints. Continuing to source fetch."
          fi

      - name: Fetch source data
        env:
          FETCH_SOURCE_MODE: run
        run: python fetch_source_data.py

      - name: Stop network tunnel before publish stage
        if: always()
        run: |
          if [ -f /tmp/ovpn.pid ]; then
            sudo kill "$(cat /tmp/ovpn.pid)" || true
            sleep 2
          fi
          sudo pkill -x openvpn || true
          echo "Tunnel process stopped."

      - name: Process and publish data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: python process_and_publish.py
