name: Scheduled TS

on:
  workflow_dispatch:

concurrency:
  group: scheduled-ts
  cancel-in-progress: true

jobs:
  scheduled-job:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Log trigger time
        run: |
          echo "Triggered at UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "Triggered at Turkey time: $(TZ=Europe/Istanbul date '+%Y-%m-%d %H:%M:%S')"

      - name: Install tunnel client
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn
          openvpn --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install requests pandas numpy supabase python-dotenv httpx
          fi

      - name: Prepare active symbol list
        env:
          GOOGLE_SHEETS_SYMBOLS_CSV_URL: ${{ vars.GOOGLE_SHEETS_SYMBOLS_CSV_URL }}
          FETCH_SOURCE_MODE: prepare_pairs
        run: python fetch_source_data.py

      - name: Sync manual zones
        env:
          GOOGLE_SHEETS_ZONES_CSV_URL: ${{ vars.GOOGLE_SHEETS_ZONES_CSV_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python sync_manual_zones.py

      - name: Fetch VPNBook credentials
        shell: bash
        run: |
          set -euo pipefail

          curl -fsSL 'https://www.vpnbook.com/tr/freevpn/openvpn' -o vpnbook_page.html

          VPN_USER_DYNAMIC="vpnbook"

          VPN_PASS_DYNAMIC="$(python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          import re

          class TextParser(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.parts = []

              def handle_data(self, data):
                  text = data.strip()
                  if text:
                      self.parts.append(text)

          html = Path("vpnbook_page.html").read_text(encoding="utf-8", errors="ignore")

          parser = TextParser()
          parser.feed(html)

          texts = [t.strip() for t in parser.parts if t.strip()]

          password = ""

          for i, text in enumerate(texts):
              if text.upper() in ("PAROLA", "PASSWORD"):
                  for candidate in texts[i + 1:i + 8]:
                      candidate = candidate.strip()
                      if candidate.lower() in ("kopyala", "copy"):
                          continue
                      if re.fullmatch(r"[A-Za-z0-9]{6,20}", candidate):
                          password = candidate
                          break
                  break

          if password:
              print(password)
          PY
          )"

          rm -f vpnbook_page.html

          if [ -z "$VPN_PASS_DYNAMIC" ]; then
            echo "::error ::VPN password fetch failed."
            exit 1
          fi

          echo "::add-mask::$VPN_USER_DYNAMIC"
          echo "::add-mask::$VPN_PASS_DYNAMIC"

          echo "VPN_USER=$VPN_USER_DYNAMIC" >> "$GITHUB_ENV"
          echo "VPN_PASS=$VPN_PASS_DYNAMIC" >> "$GITHUB_ENV"

      - name: Write tunnel credentials
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${VPN_USER:-}" ] || [ -z "${VPN_PASS:-}" ]; then
            echo "::error ::Missing VPN credentials."
            exit 1
          fi

          printf '%s\n%s\n' "$VPN_USER" "$VPN_PASS" > vpn-auth.txt
          chmod 600 vpn-auth.txt

      - name: Select working network tunnel
        shell: bash
        env:
          VPN_OVPN_1: ${{ secrets.VPN_OVPN }}
          VPN_OVPN_2: ${{ secrets.VPN_OVPN_2 }}
        run: |
          set -euo pipefail

          endpoints=(
            "https://api.ipify.org"
            "https://ifconfig.me/ip"
            "https://icanhazip.com"
          )

          cleanup_tunnel() {
            if [ -f /tmp/ovpn.pid ]; then
              sudo kill "$(cat /tmp/ovpn.pid)" || true
              sudo rm -f /tmp/ovpn.pid
              sleep 2
            fi
            sudo pkill -x openvpn || true
          }

          prepare_config() {
            local config_value="$1"

            printf '%s' "$config_value" > vpnbook.ovpn

            if grep -qi '^auth-user-pass' vpnbook.ovpn; then
              sed -i -E 's|^auth-user-pass([[:space:]].*)?$|auth-user-pass vpn-auth.txt|' vpnbook.ovpn
            else
              echo 'auth-user-pass vpn-auth.txt' >> vpnbook.ovpn
            fi

            grep -qi '^auth-nocache' vpnbook.ovpn || echo 'auth-nocache' >> vpnbook.ovpn
            grep -qi '^remote-cert-tls' vpnbook.ovpn || echo 'remote-cert-tls server' >> vpnbook.ovpn
            grep -qi '^pull-filter ignore "block-outside-dns"' vpnbook.ovpn || echo 'pull-filter ignore "block-outside-dns"' >> vpnbook.ovpn
            grep -qi '^allow-compression no' vpnbook.ovpn || echo 'allow-compression no' >> vpnbook.ovpn

            chmod 600 vpnbook.ovpn
          }

          start_tunnel() {
            sudo rm -f /tmp/ovpn.log /tmp/ovpn.pid

            sudo openvpn \
              --config vpnbook.ovpn \
              --auth-user-pass vpn-auth.txt \
              --auth-nocache \
              --daemon \
              --writepid /tmp/ovpn.pid \
              --log /tmp/ovpn.log

            for i in {1..45}; do
              if sudo grep -q 'AUTH_FAILED' /tmp/ovpn.log; then
                echo "Tunnel login failed."
                return 1
              fi

              if sudo grep -q 'Initialization Sequence Completed' /tmp/ovpn.log; then
                echo "Tunnel connected."
                return 0
              fi

              sleep 2
            done

            echo "Tunnel did not connect in time."
            return 1
          }

          check_connectivity() {
            local ip_output=""

            echo "Checking outbound connectivity..."

            for endpoint in "${endpoints[@]}"; do
              echo "Trying endpoint: $endpoint"

              for i in 1 2 3; do
                if ip_output="$(curl --fail --silent --show-error --max-time 20 "$endpoint")"; then
                  ip_output="$(echo "$ip_output" | tr -d '\r' | tr -d '\n' | xargs)"
                  if [ -n "$ip_output" ]; then
                    echo "Public IP check succeeded: $ip_output"
                    return 0
                  fi
                fi

                echo "IP check failed for $endpoint (attempt $i), retrying..."
                sleep $((i * 2))
              done
            done

            echo "Connectivity check failed on all fallback endpoints."
            return 1
          }

          configs=(
            "$VPN_OVPN_1"
            "$VPN_OVPN_2"
          )

          selected=0

          for index in "${!configs[@]}"; do
            config_value="${configs[$index]}"
            config_number=$((index + 1))

            if [ -z "${config_value:-}" ]; then
              echo "VPN config $config_number is empty, skipping."
              continue
            fi

            echo "Trying VPN config $config_number..."

            cleanup_tunnel
            prepare_config "$config_value"

            if start_tunnel && check_connectivity; then
              echo "Selected VPN config $config_number."
              selected=1
              break
            fi

            echo "VPN config $config_number failed. Trying next config..."
            echo "Last OpenVPN log lines:"
            sudo tail -n 60 /tmp/ovpn.log || true

            cleanup_tunnel
          done

          if [ "$selected" -ne 1 ]; then
            echo "::error ::All VPN configs failed. Stopping before Binance fetch."
            exit 1
          fi

      - name: Fetch source data
        env:
          GOOGLE_SHEETS_SYMBOLS_CSV_URL: ${{ vars.GOOGLE_SHEETS_SYMBOLS_CSV_URL }}
          FETCH_SOURCE_MODE: run
        run: python fetch_source_data.py

      - name: Stop network tunnel before publish stage
        if: always()
        run: |
          if [ -f /tmp/ovpn.pid ]; then
            sudo kill "$(cat /tmp/ovpn.pid)" || true
            sleep 2
          fi
          sudo pkill -x openvpn || true
          echo "Tunnel process stopped."

      - name: Process and publish data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
          ICHIMOKU_TP_MULTIPLIER: ${{ secrets.ICHIMOKU_TP_MULTIPLIER }}
        run: python process_and_publish.py
