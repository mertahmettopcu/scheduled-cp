name: Keep Streamlit Awake

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping Streamlit app
        run: |
          curl --max-time 30 --fail --write-out "\nHTTP_STATUS:%{http_code}\n" "https://scheduled-cp-xgdbr6apphni2zwxayljkbl.streamlit.app/_stcore/health"
