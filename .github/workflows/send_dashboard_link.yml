name: Send Dashboard Link

on:
  schedule:
    # 00:00 Turkey time = 21:00 UTC
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  send-dashboard-link:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Send and pin dashboard link to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          set -euo pipefail

          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_IDS" ] || [ -z "$STREAMLIT_APP_URL" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_IDS, or STREAMLIT_APP_URL secret."
            exit 1
          fi

          TEXT="📊 Güncel Dashboard:%0A${STREAMLIT_APP_URL}"

          for CHAT_ID in $(echo "$TELEGRAM_CHAT_IDS" | tr ',' ' '); do
            echo "Sending dashboard link to chat: $CHAT_ID"

            RESPONSE="$(curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}" \
              -d "text=${TEXT}" \
              -d "disable_web_page_preview=true")"

            MESSAGE_ID="$(RESPONSE="$RESPONSE" python3 -c 'import json, os, sys; data=json.loads(os.environ["RESPONSE"]); print(data["result"]["message_id"]) if data.get("ok") else (print(data, file=sys.stderr), sys.exit(1))')"

            echo "Pinning message_id: $MESSAGE_ID"

            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/pinChatMessage" \
              -d "chat_id=${CHAT_ID}" \
              -d "message_id=${MESSAGE_ID}" \
              -d "disable_notification=true"
          done
