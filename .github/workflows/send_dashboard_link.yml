name: Send Dashboard Link

on:
  schedule:
    # 00:00 Turkey time = 21:00 UTC
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  send-dashboard-link:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Send dashboard link to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_IDS" ] || [ -z "$STREAMLIT_APP_URL" ]; then
            echo "Missing TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_IDS, or STREAMLIT_APP_URL secret."
            exit 1
          fi

          TEXT="📊 Güncel Dashboard:%0A${STREAMLIT_APP_URL}"

          # Supports one chat id or multiple ids separated by comma or space.
          for CHAT_ID in $(echo "$TELEGRAM_CHAT_IDS" | tr ',' ' '); do
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}" \
              -d "text=${TEXT}" \
              -d "disable_web_page_preview=true"
          done
